# DigitalOcean App Platform — Worker (long polling).
# Secrets: scope BOT_TOKEN and FACEIT_API_KEY to RUN_TIME (not build-only) or the process exits at start.
# Omit DB_PATH here unless you use a relative path; /data/... needs a Docker volume (see docker-compose.yml).
# doctl: doctl apps create --spec .do/app.yaml

name: cs2-faceit-bot
region: fra

workers:
  - name: bot
    dockerfile_path: Dockerfile
    source_dir: /
    instance_count: 1
    instance_size_slug: basic-xxs
    github:
      repo: bluemadisonblue/CS2DATA
      branch: main
      deploy_on_push: true
    envs:
      - key: BOT_TOKEN
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_ME_IN_DASHBOARD
      - key: FACEIT_API_KEY
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_ME_IN_DASHBOARD
      - key: PYTHONUNBUFFERED
        scope: RUN_TIME
        type: GENERAL
        value: "1"
